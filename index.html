<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Controle de Cartões</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  </head>
  <body class="bg-light">
    <main class="container py-4 py-md-5">
      <section class="row justify-content-center">
        <div class="col-12 col-lg-10">
          <div class="card shadow-sm border-0">
            <div class="card-body p-4 p-md-5">
              <div class="d-flex justify-content-between align-items-start mb-4">
                <div>
                  <span class="badge text-bg-primary mb-2">Painel inicial</span>
                  <h1 class="h3 mb-1">Controle de cartões</h1>
                </div>
                <div class="d-flex flex-column gap-2 text-end">
                  <div class="d-flex gap-2">
                    <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#lancarCompraModal">➕ Lançar Compra</button>
                  </div>
                  <a href="#" class="btn btn-outline-danger btn-sm" onclick="alert('O sistema de Login/Logout será ativado em breve.')">Sair do Painel</a>
                </div>
              </div>

              <div class="mb-4">
                <h2 class="h5 mb-3">Cartões cadastrados</h2>
                <div id="cartoes-grid" class="row g-3 pb-5">
                   <div class="col-12">Carregando cartões...</div>
                </div>
              </div>

              <div class="mt-4">
                <h2 class="h5 mb-3">Compras recentes</h2>
                <div class="table-responsive">
                  <table class="table table-striped table-hover align-middle mb-0">
                    <thead class="table-light">
                      <tr><th>Data</th><th>Descrição</th><th>Categoria</th><th>Cartão</th><th>Parcelas</th><th class="text-end">Valor</th></tr>
                    </thead>
                    <tbody id="compras-tabela">
                      <tr><td colspan="6" class="text-center py-4">Carregando compras...</td></tr>
                    </tbody>
                  </table>
                </div>
              </div>
            </div>
          </div>
        </div>
      </section>
    </main>

    <!-- MODAL DE NOVA COMPRA -->
    <div class="modal fade" id="lancarCompraModal" tabindex="-1" aria-hidden="true">
      <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
          <div class="modal-header">
            <h2 class="modal-title fs-5">Nova compra</h2>
            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Fechar"></button>
          </div>
          <div class="modal-body">
            <form id="form-nova-compra">
              <div class="row g-3">
                <div class="col-md-6">
                  <label class="form-label">Data</label>
                  <input type="date" class="form-control" id="compraData" required>
                </div>
                <div class="col-md-6">
                  <label class="form-label">Valor (R$)</label>
                  <input type="number" step="0.01" class="form-control" id="compraValor" placeholder="0.00" required>
                </div>
                <div class="col-12">
                  <label class="form-label">Descrição</label>
                  <input type="text" class="form-control" id="compraDescricao" placeholder="Ex: Supermercado" required>
                </div>
                <div class="col-md-4">
                  <label class="form-label">Categoria</label>
                  <select class="form-select" id="compraCategoria">
                    <option value="Alimentação">Alimentação</option>
                    <option value="Transporte">Transporte</option>
                    <option value="Lazer">Lazer</option>
                    <option value="Outros">Outros</option>
                  </select>
                </div>
                <div class="col-md-4">
                  <label class="form-label">Cartão</label>
                  <select class="form-select" id="compraCartao">
                    <option value="Cartão 1">Cartão 1</option>
                    <option value="Cartão 2">Cartão 2</option>
                  </select>
                </div>
                <div class="col-md-4">
                  <label class="form-label">Parcelas</label>
                  <input type="number" class="form-control" id="compraParcelas" value="1" min="1">
                </div>
              </div>
            </form>
          </div>
          <div class="modal-footer">
            <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancelar</button>
            <button type="button" class="btn btn-primary" onclick="salvarCompra()">Salvar compra</button>
          </div>
        </div>
      </div>
    </div>

    <script>
      const supabase = supabase.createClient(
          'https://ymvhewteeeebvytqqbpi.supabase.co', 
          'sb_publishable_2ux_x8lm-Iv6ZfxxceFmDQ_JcmFLL'
      );

      async function carregarDados() {
          const grid = document.getElementById('cartoes-grid');
          const tbody = document.getElementById('compras-tabela');
          
          try {
              const { data: cartoes } = await supabase.from('cartoes').select('*');
              const { data: compras } = await supabase.from('compras').select('*');
              
              if (cartoes && cartoes.length > 0) {
                  grid.innerHTML = cartoes.map(c => `
                    <div class="col-md-3"><div class="border rounded p-3 bg-white shadow-sm"><strong>${c.nome || 'Cartão'}</strong><br>Limite: R$ ${c.limite || '0.00'}</div></div>
                  `).join('');
              } else {
                  grid.innerHTML = '<div class="col-12 text-muted">Nenhum cartão encontrado.</div>';
              }
              
              if (compras && compras.length > 0) {
                  tbody.innerHTML = compras.map(c => `
                    <tr><td>${c.data}</td><td>${c.descricao}</td><td>${c.categoria}</td><td>${c.cartao}</td><td>${c.parcelas}</td><td class="text-end">R$ ${c.valor}</td></tr>
                  `).join('');
              } else {
                  tbody.innerHTML = '<tr><td colspan="6" class="text-center py-4 text-muted">Nenhuma compra registrada.</td></tr>';
              }
          } catch (erro) {
              console.error("Erro ao carregar:", erro);
          }
      }

      async function salvarCompra() {
          const data = document.getElementById('compraData').value;
          const valor = document.getElementById('compraValor').value;
          const descricao = document.getElementById('compraDescricao').value;
          const categoria = document.getElementById('compraCategoria').value;
          const cartao = document.getElementById('compraCartao').value;
          const parcelas = document.getElementById('compraParcelas').value;

          if (!data || !valor || !descricao) {
              alert("Por favor, preencha a Data, Valor e Descrição.");
              return;
          }

          const { error } = await supabase.from('compras').insert([
              { 
                  data: data, 
                  valor: parseFloat(valor), 
                  descricao: descricao, 
                  categoria: categoria, 
                  cartao: cartao, 
                  parcelas: parseInt(parcelas) 
              }
          ]);

          if (error) {
              alert("Erro ao salvar: " + error.message);
              console.error(error);
          } else {
              // Limpa o formulário
              document.getElementById('form-nova-compra').reset();
              
              // Esconde a janela modal
              const modalElement = document.getElementById('lancarCompraModal');
              const modalInstance = bootstrap.Modal.getInstance(modalElement) || new bootstrap.Modal(modalElement);
              modalInstance.hide();
              
              // Recarrega a tabela para mostrar a compra nova na hora
              carregarDados();
          }
      }
      
      carregarDados();
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
