<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Controle de Cartões</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
      .cartao-banco { transition: transform 0.2s, box-shadow 0.2s; border: none !important; }
      .cartao-banco:hover { transform: translateY(-5px); box-shadow: 0 .5rem 1rem rgba(0,0,0,.15)!important; }
    </style>
  </head>
  <body class="bg-light">
    <main class="container py-4 py-md-5">
      <section class="row justify-content-center">
        <div class="col-12 col-lg-10">
          <div class="card shadow-sm border-0">
            <div class="card-body p-4 p-md-5">
              <div class="d-flex justify-content-between align-items-start mb-4">
                <div>
                  <span class="badge text-bg-primary mb-2">Painel inicial</span>
                  <h1 class="h3 mb-1">Controle de cartões</h1>
                </div>
                <div class="d-flex flex-column gap-2 text-end">
                  <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#lancarCompraModal">➕ Lançar Compra</button>
                  <a href="#" class="btn btn-outline-danger btn-sm" onclick="alert('Sistema de login em breve.')">Sair</a>
                </div>
              </div>

              <div class="mb-4">
                <h2 class="h5 mb-3">Cartões cadastrados</h2>
                <div id="cartoes-grid" class="row g-3 pb-5">
                   <div class="col-12">Carregando cartões...</div>
                </div>
              </div>

              <div class="mt-4">
                <h2 class="h5 mb-3">Compras recentes</h2>
                <div class="table-responsive">
                  <table class="table table-striped table-hover align-middle mb-0">
                    <thead class="table-light">
                      <tr><th>Data</th><th>Descrição</th><th>Categoria</th><th>Cartão</th><th>Parcelas</th><th class="text-end">Valor</th></tr>
                    </thead>
                    <tbody id="compras-tabela">
                      <tr><td colspan="6" class="text-center py-4">Carregando compras...</td></tr>
                    </tbody>
                  </table>
                </div>
              </div>
            </div>
          </div>
        </div>
      </section>
    </main>

    <div class="modal fade" id="lancarCompraModal" tabindex="-1" aria-hidden="true">
      <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
          <div class="modal-header">
            <h2 class="modal-title fs-5">Nova compra</h2>
            <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
          </div>
          <div class="modal-body">
            <form id="form-nova-compra">
              <div class="row g-3">
                <div class="col-md-6"><label class="form-label">Data</label><input type="date" class="form-control" id="compraData" required></div>
                <div class="col-md-6"><label class="form-label">Valor (R$)</label><input type="number" step="0.01" class="form-control" id="compraValor" required></div>
                <div class="col-12"><label class="form-label">Descrição</label><input type="text" class="form-control" id="compraDescricao" required></div>
                <div class="col-md-4">
                  <label class="form-label">Categoria</label>
                  <select class="form-select" id="compraCategoria">
                    <option value="Alimentação">Alimentação</option><option value="Transporte">Transporte</option><option value="Moradia">Moradia</option><option value="Outros">Outros</option>
                  </select>
                </div>
                <div class="col-md-4"><label class="form-label">Cartão</label><select class="form-select" id="compraCartao"><option value="">Carregando...</option></select></div>
                <div class="col-md-4"><label class="form-label">Parcelas</label><input type="number" class="form-control" id="compraParcelas" value="1" min="1"></div>
              </div>
            </form>
          </div>
          <div class="modal-footer">
            <button type="button" class="btn btn-primary" onclick="salvarCompra()">Salvar compra</button>
          </div>
        </div>
      </div>
    </div>

    <script>
      // INICIALIZAÇÃO CORRETA
      const supabase = supabase.createClient(
          'https://ymvhewteeeebvytqqbpi.supabase.co', 
          'sb_publishable_2ux_x8lm-Iv6ZfxxceFmDQ_JcmFLL'
      );

      function obterEstiloCartao(nome) {
          const n = (nome || '').toLowerCase();
          if (n.includes('nubank')) return 'background: linear-gradient(135deg, #8A05BE, #41025D); color: white;';
          if (n.includes('itau')) return 'background: linear-gradient(135deg, #EC7000, #FF9900); color: white;';
          return 'background: linear-gradient(135deg, #4A5568, #2D3748); color: white;';
      }

      async function carregarDados() {
          const grid = document.getElementById('cartoes-grid');
          const tbody = document.getElementById('compras-tabela');
          const selectCartao = document.getElementById('compraCartao');
          
          try {
              const { data: cartoes, error: errC } = await supabase.from('cartoes').select('*');
              const { data: compras, error: errP } = await supabase.from('compras').select('*');
              
              if (errC) throw errC;
              
              if (cartoes && cartoes.length > 0) {
                  grid.innerHTML = cartoes.map(c => `
                      <div class="col-md-3">
                        <div class="rounded p-3 shadow-sm cartao-banco" style="${obterEstiloCartao(c.nome)}">
                          <strong>${c.nome}</strong><br>R$ ${c.limite || '0.00'}
                        </div>
                      </div>`).join('');
                  selectCartao.innerHTML = cartoes.map(c => `<option value="${c.nome}">${c.nome}</option>`).join('');
              } else {
                  grid.innerHTML = '<div class="col-12">Nenhum cartão cadastrado.</div>';
              }
              
              if (compras) {
                  tbody.innerHTML = compras.length > 0 ? compras.map(c => `
                    <tr><td>${c.data}</td><td>${c.descricao}</td><td>${c.categoria}</td><td>${c.cartao}</td><td>${c.parcelas}</td><td class="text-end">R$ ${c.valor}</td></tr>
                  `).join('') : '<tr><td colspan="6" class="text-center">Nenhuma compra.</td></tr>';
              }
          } catch (erro) {
              console.error("Erro completo:", erro);
              alert("Erro na conexão: " + erro.message);
          }
      }

      async function salvarCompra() {
          const dados = {
              data: document.getElementById('compraData').value,
              valor: parseFloat(document.getElementById('compraValor').value),
              descricao: document.getElementById('compraDescricao').value,
              categoria: document.getElementById('compraCategoria').value,
              cartao: document.getElementById('compraCartao').value,
              parcelas: parseInt(document.getElementById('compraParcelas').value)
          };

          const { error } = await supabase.from('compras').insert([dados]);
          if (error) alert("Erro ao salvar: " + error.message);
          else {
              alert("Salvo com sucesso!");
              carregarDados();
          }
      }
      
      carregarDados();
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
