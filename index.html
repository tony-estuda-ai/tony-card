<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Controle de Cartões</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
      /* Efeito de elevação para os cartões ficarem com aspecto real */
      .cartao-banco {
        transition: transform 0.2s, box-shadow 0.2s;
        border: none !important;
      }
      .cartao-banco:hover {
        transform: translateY(-5px);
        box-shadow: 0 .5rem 1rem rgba(0,0,0,.15)!important;
      }
    </style>
  </head>
  <body class="bg-light">
    <main class="container py-4 py-md-5">
      <section class="row justify-content-center">
        <div class="col-12 col-lg-10">
          <div class="card shadow-sm border-0">
            <div class="card-body p-4 p-md-5">
              <div class="d-flex justify-content-between align-items-start mb-4">
                <div>
                  <span class="badge text-bg-primary mb-2">Painel inicial</span>
                  <h1 class="h3 mb-1">Controle de cartões</h1>
                </div>
                <div class="d-flex flex-column gap-2 text-end">
                  <div class="d-flex gap-2">
                    <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#lancarCompraModal">➕ Lançar Compra</button>
                  </div>
                  <a href="#" class="btn btn-outline-danger btn-sm" onclick="alert('O sistema de Login/Logout será ativado em breve.')">Sair do Painel</a>
                </div>
              </div>

              <div class="mb-4">
                <h2 class="h5 mb-3">Cartões cadastrados</h2>
                <div id="cartoes-grid" class="row g-3 pb-5">
                   <div class="col-12">Carregando cartões...</div>
                </div>
              </div>

              <div class="mt-4">
                <h2 class="h5 mb-3">Compras recentes</h2>
                <div class="table-responsive">
                  <table class="table table-striped table-hover align-middle mb-0">
                    <thead class="table-light">
                      <tr><th>Data</th><th>Descrição</th><th>Categoria</th><th>Cartão</th><th>Parcelas</th><th class="text-end">Valor</th></tr>
                    </thead>
                    <tbody id="compras-tabela">
                      <tr><td colspan="6" class="text-center py-4">Carregando compras...</td></tr>
                    </tbody>
                  </table>
                </div>
              </div>
            </div>
          </div>
        </div>
      </section>
    </main>

    <div class="modal fade" id="lancarCompraModal" tabindex="-1" aria-hidden="true">
      <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
          <div class="modal-header">
            <h2 class="modal-title fs-5">Nova compra</h2>
            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Fechar"></button>
          </div>
          <div class="modal-body">
            <form id="form-nova-compra">
              <div class="row g-3">
                <div class="col-md-6">
                  <label class="form-label">Data</label>
                  <input type="date" class="form-control" id="compraData" required>
                </div>
                <div class="col-md-6">
                  <label class="form-label">Valor (R$)</label>
                  <input type="number" step="0.01" class="form-control" id="compraValor" placeholder="0.00" required>
                </div>
                <div class="col-12">
                  <label class="form-label">Descrição</label>
                  <input type="text" class="form-control" id="compraDescricao" placeholder="Ex: Supermercado" required>
                </div>
                <div class="col-md-4">
                  <label class="form-label">Categoria</label>
                  <select class="form-select" id="compraCategoria">
                    <option value="Alimentação">Alimentação</option>
                    <option value="Transporte/Combustível">Transporte/Combustível</option>
                    <option value="Moradia/Contas">Moradia/Contas</option>
                    <option value="Saúde/Farmácia">Saúde/Farmácia</option>
                    <option value="Educação">Educação</option>
                    <option value="Lazer/Restaurante">Lazer/Restaurante</option>
                    <option value="Assinaturas/Internet">Assinaturas/Internet</option>
                    <option value="Vestuário">Vestuário</option>
                    <option value="Outros">Outros</option>
                  </select>
                </div>
                <div class="col-md-4">
                  <label class="form-label">Cartão</label>
                  <select class="form-select" id="compraCartao">
                    <option value="">Carregando...</option>
                  </select>
                </div>
                <div class="col-md-4">
                  <label class="form-label">Parcelas</label>
                  <input type="number" class="form-control" id="compraParcelas" value="1" min="1">
                </div>
              </div>
            </form>
          </div>
          <div class="modal-footer">
            <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancelar</button>
            <button type="button" class="btn btn-primary" onclick="salvarCompra()">Salvar compra</button>
          </div>
        </div>
      </div>
    </div>

    <script>
      const supabase = supabase.createClient(
          'https://ymvhewteeeebvytqqbpi.supabase.co', 
          'sb_publishable_2ux_x8lm-Iv6ZfxxceFmDQ_JcmFLL'
      );

      // Função para definir a cor baseada no nome do banco
      function obterEstiloCartao(nome) {
          const n = (nome || '').toLowerCase();
          if (n.includes('nubank')) return 'background: linear-gradient(135deg, #8A05BE, #41025D); color: white;';
          if (n.includes('itaú') || n.includes('itau')) return 'background: linear-gradient(135deg, #EC7000, #FF9900); color: white;';
          if (n.includes('bradesco')) return 'background: linear-gradient(135deg, #CC092F, #8A061D); color: white;';
          if (n.includes('brasil') || n.includes('bb')) return 'background: linear-gradient(135deg, #F9D308, #C2A300); color: #003087;';
          if (n.includes('santander')) return 'background: linear-gradient(135deg, #EC0000, #990000); color: white;';
          if (n.includes('caixa')) return 'background: linear-gradient(135deg, #005CA9, #0081C6); color: white;';
          if (n.includes('inter')) return 'background: linear-gradient(135deg, #FF7A00, #E06B00); color: white;';
          if (n.includes('c6')) return 'background: linear-gradient(135deg, #242424, #000000); color: white;';
          if (n.includes('xp')) return 'background: linear-gradient(135deg, #000000, #333333); color: #FFD700; border: 1px solid #FFD700 !important;';
          
          // Cor padrão elegante para outros cartões
          return 'background: linear-gradient(135deg, #4A5568, #2D3748); color: white;';
      }

      async function carregarDados() {
          const grid = document.getElementById('cartoes-grid');
          const tbody = document.getElementById('compras-tabela');
          const selectCartao = document.getElementById('compraCartao');
          
          try {
              const { data: cartoes } = await supabase.from('cartoes').select('*');
              const { data: compras } = await supabase.from('compras').select('*');
              
              if (cartoes && cartoes.length > 0) {
                  // Preenche os cards com as cores da identidade visual
                  grid.innerHTML = cartoes.map(c => {
                      const estilo = obterEstiloCartao(c.nome);
                      return `
                        <div class="col-md-3">
                          <div class="rounded p-3 shadow-sm cartao-banco" style="${estilo}">
                            <strong class="fs-5">${c.nome || 'Cartão'}</strong><br>
                            <span style="opacity: 0.8; font-size: 0.9em;">Limite:</span><br>
                            <span class="fs-5">R$ ${c.limite || '0.00'}</span>
                          </div>
                        </div>
                      `;
                  }).join('');
                  
                  // Preenche o formulário
                  selectCartao.innerHTML = cartoes.map(c => `
                    <option value="${c.nome || c.id}">${c.nome || 'Cartão sem nome'}</option>
                  `).join('');
              } else {
                  grid.innerHTML = '<div class="col-12 text-muted">Nenhum cartão encontrado.</div>';
                  selectCartao.innerHTML = '<option value="">Cadastre um cartão primeiro</option>';
              }
              
              if (compras && compras.length > 0) {
                  tbody.innerHTML = compras.map(c => `
                    <tr><td>${c.data}</td><td>${c.descricao}</td><td>${c.categoria}</td><td>${c.cartao}</td><td>${c.parcelas}</td><td class="text-end">R$ ${c.valor}</td></tr>
                  `).join('');
              } else {
                  tbody.innerHTML = '<tr><td colspan="6" class="text-center py-4 text-muted">Nenhuma compra registrada.</td></tr>';
              }
          } catch (erro) {
              console.error("Erro ao carregar:", erro);
          }
      }

      async function salvarCompra() {
          const data = document.getElementById('compraData').value;
          const valor = document.getElementById('compraValor').value;
          const descricao = document.getElementById('compraDescricao').value;
          const categoria = document.getElementById('compraCategoria').value;
          const cartao = document.getElementById('compraCartao').value;
          const parcelas = document.getElementById('compraParcelas').value;

          if (!data || !valor || !descricao || !cartao) {
              alert("Por favor, preencha todos os campos obrigatórios.");
              return;
          }

          const { error } = await supabase.from('compras').insert([
              { 
                  data: data, 
                  valor: parseFloat(valor), 
                  descricao: descricao, 
                  categoria: categoria, 
                  cartao: cartao, 
                  parcelas: parseInt(parcelas) 
              }
          ]);

          if (error) {
              alert("Erro ao salvar: " + error.message);
              console.error(error);
          } else {
              document.getElementById('form-nova-compra').reset();
              const modalElement = document.getElementById('lancarCompraModal');
              const modalInstance = bootstrap.Modal.getInstance(modalElement) || new bootstrap.Modal(modalElement);
              modalInstance.hide();
              carregarDados();
          }
      }
      
      carregarDados();
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
