<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tony Card - Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: radial-gradient(circle at center, #1a1f36 0%, #0a0c16 100%);
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 40px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5), 0 0 30px rgba(0, 123, 255, 0.1);
            backdrop-filter: blur(10px);
        }
        .glow-title {
            text-shadow: 0 0 15px rgba(0, 123, 255, 0.6);
            font-weight: 700;
            text-align: center;
        }
        .form-control {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            padding: 12px;
            border-radius: 8px;
        }
        .form-control:focus {
            background: rgba(0, 0, 0, 0.5);
            border-color: #0072ff;
            color: white;
            box-shadow: 0 0 10px rgba(0, 114, 255, 0.5);
        }
        .btn-login {
            background: linear-gradient(90deg, #00c6ff 0%, #0072ff 100%);
            border: none;
            color: white;
            padding: 12px;
            font-weight: 600;
            border-radius: 8px;
            box-shadow: 0 5px 15px rgba(0, 114, 255, 0.3);
            transition: all 0.3s ease;
            width: 100%;
            margin-top: 15px;
        }
        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0, 114, 255, 0.5);
            color: white;
        }
        .error-alert {
            background: rgba(220, 53, 69, 0.2);
            border: 1px solid #dc3545;
            color: #ea868f;
            padding: 10px;
            border-radius: 8px;
            font-size: 0.9rem;
            margin-bottom: 20px;
            text-align: center;
        }
    </style>
</head>
<body>

    <div class="login-card">
        <h2 class="glow-title mb-4">Acessar Sistema</h2>
        
        <!-- Mensagem de Erro caso erre a senha -->
        {% if erro %}
            <div class="error-alert">
                {{ erro }}
            </div>
        {% endif %}

        <form action="/login" method="POST">
            <div class="mb-3">
                <label for="email" class="form-label text-secondary">E-mail Cadastrado</label>
                <input type="email" class="form-control" id="email" name="email" placeholder="seuemail@teste.com" required>
            </div>
            
            <div class="mb-4">
                <label for="senha" class="form-label text-secondary">Sua Senha</label>
                <input type="password" class="form-control" id="senha" name="senha" placeholder="Digite sua senha" required>
            </div>
            
            <button type="submit" class="btn btn-login">Entrar no Painel ➔</button>
        </form>
    </div>

</body>
</html>
