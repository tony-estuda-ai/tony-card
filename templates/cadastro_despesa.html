<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Despesas - Tony Card</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-dark text-light">
    <div class="container mt-5">
        <h2 class="mb-4">Nova Despesa</h2>
        <form id="formDespesa" class="bg-secondary p-4 shadow rounded">
            <div class="mb-3">
                <label>Data</label>
                <input type="date" id="data" class="form-control" required>
            </div>
            <div class="mb-3">
                <label>Descrição</label>
                <input type="text" id="descricao" class="form-control" required>
            </div>
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label>Cartão</label>
                    <select id="cartao_id" class="form-control" required></select>
                </div>
                <div class="col-md-6 mb-3">
                    <label>Valor (R$)</label>
                    <input type="number" step="0.01" id="valor" class="form-control" required>
                </div>
            </div>
            <button type="submit" class="btn btn-primary mt-3">Confirmar Lançamento</button>
            <a href="/painel" class="btn btn-secondary mt-3">Voltar ao Painel</a>
        </form>
    </div>
    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
