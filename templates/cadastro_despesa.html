<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Cadastro de Despesas - Tony Card</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-dark text-light">
    <div class="container mt-5">
        <h2>Nova Despesa</h2>
        <form id="formDespesa" class="bg-secondary p-4 shadow rounded">
            <div class="mb-3">
                <label>Data</label>
                <input type="date" id="data" class="form-control" required>
            </div>
            <div class="mb-3">
                <label>Descrição</label>
                <input type="text" id="descricao" class="form-control" required>
            </div>
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label>Cartão</label>
                    <select id="cartao_id" class="form-control" required></select>
                </div>
                <div class="col-md-6 mb-3">
                    <label>Valor (R$)</label>
                    <input type="number" step="0.01" id="valor" class="form-control" required>
                </div>
            </div>
            <button type="submit" class="btn btn-primary mt-3">Confirmar Lançamento</button>
            <a href="/painel" class="btn btn-secondary mt-3">Voltar ao Painel</a>
        </form>
    </div>

    <script>
        // Carrega os cartões ao abrir a página
        async function carregarCartoes() {
            const resposta = await fetch('/api/lista-cartoes');
            const dados = await resposta.json();
            const select = document.getElementById('cartao_id');
            select.innerHTML = '<option value="">Selecione o cartão...</option>';
            dados.cartoes.forEach(cartao => {
                select.innerHTML += `<option value="${cartao.id}">${cartao.nome}</option>`;
            });
        }
        carregarCartoes();

        document.getElementById('formDespesa').addEventListener('submit', async (e) => {
            e.preventDefault();
            const dados = {
                data: document.getElementById('data').value,
                descricao: document.getElementById('descricao').value,
                cartao_id: document.getElementById('cartao_id').value,
                valor: document.getElementById('valor').value
            };

            const resposta = await fetch('/api/salvar-despesa', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(dados)
            });

            const resultado = await resposta.json();
            if (resposta.ok) {
                alert("Lançamento efetuado com sucesso!");
                window.location.href = "/painel";
            } else {
                alert(resultado.erro || "Erro ao salvar despesa.");
            }
        });
    </script>
</body>
</html>
